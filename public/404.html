<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Isaac Seiler</title>
    <style>
      @keyframes bsod-eye-blink {
        0%,
        5%,
        100% {
          transform: scaleY(1);
          opacity: 1;
        }

        2.5% {
          transform: scaleY(0.08);
          opacity: 0.75;
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #0078d7;
      }

      body {
        overflow: hidden;
        color: #fff;
        font-family: "Segoe UI", Arial, sans-serif;
        font-weight: 300;
      }

      main {
        min-height: 100vh;
        padding: 14vh 10vw;
      }

      .content {
        max-width: 64rem;
      }

      .face {
        display: flex;
        align-items: center;
        gap: clamp(0.9rem, 2.2vw, 1.8rem);
        margin-bottom: 2rem;
        font-size: clamp(5.25rem, 13vw, 9.8rem);
        line-height: 1;
      }

      .eyes {
        display: grid;
        height: 0.96em;
        grid-template-rows: repeat(2, 1fr);
        align-items: center;
        gap: 0.18em;
      }

      .eye {
        display: block;
        width: 0.105em;
        height: 0.105em;
        background: #fff;
        animation: bsod-eye-blink 4.8s steps(1, end) 5s infinite;
        transform-origin: center;
      }

      h1 {
        max-width: 58rem;
        margin: 0;
        font-size: clamp(1.9rem, 4.1vw, 3.35rem);
        font-weight: 300;
        line-height: 1.34;
      }

      .home {
        margin: clamp(2.5rem, 5vw, 3rem) 0 0;
        color: rgba(255, 255, 255, 0.95);
        font-size: clamp(1.1rem, 2vw, 1.6rem);
        line-height: 1.55;
      }

      a {
        color: inherit;
        text-decoration-color: rgba(255, 255, 255, 0.7);
        text-underline-offset: 0.2em;
      }

      a:hover {
        color: rgba(255, 255, 255, 0.75);
      }

      .details {
        margin-top: clamp(3rem, 5vw, 3.5rem);
        color: rgba(255, 255, 255, 0.9);
        font-size: clamp(0.82rem, 1.1vw, 1rem);
        line-height: 1.55;
      }

      .details p {
        margin: 0 0 1.25rem;
      }

      @media (min-width: 640px) {
        main {
          padding: 18vh 10.5vw;
        }

        .face {
          margin-bottom: 2.25rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="content">
        <div class="face" aria-label="Sad face">
          <span class="eyes" aria-hidden="true">
            <span class="eye"></span>
            <span class="eye"></span>
          </span>
          <span aria-hidden="true">(</span>
        </div>

        <h1>The page you are looking for doesn't seem to exist. I probably accidentally deleted it.</h1>

        <p class="home">
          Go back to the home page
          <a href="/">here</a>.
        </p>

        <div class="details">
          <p>For more information about this issue and possible fixes, visit the missing page's previous location.</p>
          <p>
            Stop code: PAGE_NOT_FOUND<br />
            Error info: 0x00000404
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
